name: "Build Python wheels"

# Reusable workflow: build wheels + sdist for every platform and upload them as
# `wheels-*` artifacts, then run the test suite against the built wheel. The
# package version comes from the workspace Cargo.toml (kept in sync by
# scripts/sync-versions.sh).
#
# Publishing is intentionally NOT done here: PyPI Trusted Publishing matches the
# OIDC `job_workflow_ref` claim, which for a reusable workflow points at this
# file rather than the entry workflow — and PyPI has no way to configure a
# reusable workflow as the trusted publisher (pypi/warehouse#11096). So the
# `pypa/gh-action-pypi-publish` step lives directly in release.yml, where
# `job_workflow_ref` == release.yml and the trusted publisher matches.

on:
  workflow_call: {}

jobs:
  linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      matrix:
        target: [x86_64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install OpenSSL development packages
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --manifest-path pubmed-client-py/Cargo.toml
          manylinux: auto
          container: off
        env:
          PYO3_PYTHON: python3
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --manifest-path pubmed-client-py/Cargo.toml
        env:
          PYO3_PYTHON: python
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false # Disable cache on publish workflows to prevent cache poisoning
        env:
          PYO3_PYTHON: python3

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --manifest-path pubmed-client-py/Cargo.toml
        env:
          PYO3_PYTHON: python3
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          persist-credentials: false

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist --manifest-path pubmed-client-py/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-sdist
          path: dist

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    needs: [linux]
    # uv (and PYO3_PYTHON) live in mise.python.toml, which mise only loads when
    # MISE_ENV=python. Without this the mise step installs nothing and the later
    # `uv venv` fails with "uv: command not found" (exit 127).
    env:
      MISE_ENV: python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          persist-credentials: false

      - name: mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false # Disable cache on publish workflows to prevent cache poisoning

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels-linux-x86_64
          path: dist

      - name: Install wheel
        run: |
          uv venv
          uv pip install dist/*.whl
        working-directory: .

      - name: Run tests
        run: |
          cd pubmed-client-py
          uv run pytest -v -m "not integration"

      - name: Type check
        # Same command as ci-python.yml's lint job; strictness lives in
        # pyproject.toml's [tool.mypy] so the two cannot drift apart.
        run: |
          cd pubmed-client-py
          uv run mypy .

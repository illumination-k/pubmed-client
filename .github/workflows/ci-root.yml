name: "CI / Root"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  MISE_EXPERIMENTAL: true
  MISE_ENV: root

jobs:
  lint:
    name: Lint and Format
    # Local: MISE_ENV=root mise run lint:root
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          persist-credentials: false

      - uses: ./.github/actions/setup-repo

      - name: Run lint
        run: mise run lint:root

  version-sync:
    name: Version Consistency
    # Local: scripts/sync-versions.sh --check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check all package versions are in sync
        run: scripts/sync-versions.sh --check

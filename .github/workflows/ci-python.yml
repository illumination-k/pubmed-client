name: "CI / Python"

on:
  push:
    branches: [main]
    paths:
      - "pubmed-client-py/**"
      - "pubmed-client/src/**"
      - "pubmed-client/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-python.yml"
      - ".github/actions/setup-repo/**"
  pull_request:
    branches: [main]
    paths:
      - "pubmed-client-py/**"
      - "pubmed-client/src/**"
      - "pubmed-client/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-python.yml"
      - ".github/actions/setup-repo/**"

env:
  CARGO_TERM_COLOR: always
  MISE_EXPERIMENTAL: true
  MISE_ENV: python

jobs:
  lint:
    name: Python Lint & Format
    # Local: MISE_ENV=python mise run lint:py
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-repo

      - name: Pin Python version
        run: uv python pin 3.12

      - name: Install dependencies
        working-directory: pubmed-client-py
        run: uv sync --dev

      - name: Run ruff check
        working-directory: pubmed-client-py
        run: uv run ruff check .

      - name: Run ruff format check
        working-directory: pubmed-client-py
        run: uv run ruff format --check .

      - name: Run mypy
        working-directory: pubmed-client-py
        run: uv run mypy .

  stub:
    name: Python Type Stub Check
    # Local: MISE_ENV=python mise run stubgen:py   # regenerate pubmed_client.pyi
    #        MISE_ENV=python mise run stubtest:py   # verify it matches the module
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-repo

      - name: Pin Python version
        run: uv python pin 3.12

      - name: Install dependencies
        working-directory: pubmed-client-py
        run: uv sync --dev

      - name: Regenerate type stub from Rust source
        working-directory: pubmed-client-py
        run: cargo run --quiet --bin stub_gen

      - name: Verify checked-in stub is up to date
        # Fails if the Rust API changed without regenerating pubmed_client.pyi.
        # Fix locally with: MISE_ENV=python mise run stubgen:py
        run: git diff --exit-code -- pubmed-client-py/pubmed_client.pyi

      - name: Build Python package with maturin
        working-directory: pubmed-client-py
        run: uv run --with maturin maturin develop

      - name: Run stubtest
        # Fails if the compiled module and the stub disagree (missing/extra
        # classes, methods, or attributes) — including surface the generator
        # cannot see (the exception hierarchy, __version__).
        working-directory: pubmed-client-py
        run: uv run python -m mypy.stubtest pubmed_client --allowlist stubtest-allowlist.txt

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    # Local: MISE_ENV=python mise run py:test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-repo

      - name: Pin Python version
        run: uv python pin ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: pubmed-client-py
        run: uv sync --dev

      - name: Build Python package with maturin
        working-directory: pubmed-client-py
        run: uv run --with maturin maturin develop

      - name: Run tests
        working-directory: pubmed-client-py
        run: uv run pytest -v -m "not integration"

  coverage:
    name: Python Test Coverage
    # Local: MISE_ENV=python mise run py:coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-repo

      - name: Pin Python version
        run: uv python pin 3.12

      - name: Install dependencies
        working-directory: pubmed-client-py
        run: |
          uv sync --dev
          uv add --dev pytest-cov

      - name: Build Python package with maturin
        working-directory: pubmed-client-py
        run: uv run --with maturin maturin develop

      - name: Run tests with coverage
        working-directory: pubmed-client-py
        run: uv run pytest --cov=pubmed_client --cov-report=xml --cov-report=html -m "not integration"

name: "Publish NAPI (npm)"

# Reusable workflow: build native binaries for every target and publish the
# `pubmed-client` npm package (+ platform optionalDependencies). Invoked by
# release.yml. Set dry-run to validate packaging without publishing.

on:
  workflow_call:
    inputs:
      dry-run:
        description: "Build and pack without publishing to npm"
        required: false
        type: boolean
        default: false
      environment:
        description: >-
          GitHub Environment for the publish job. Its OIDC `environment` claim
          must match the npm Trusted Publisher config. Empty string = no
          environment gate (used for dry-runs).
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always
  DEBUG: napi:*
  APP_NAME: pubmed-client
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  SKIP_POSTINSTALL: "1"
  MISE_ENV: node

jobs:
  build:
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: pnpm build --target x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm build --target x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm build --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: pnpm build --target x86_64-unknown-linux-musl -x
          - host: macos-latest
            target: aarch64-apple-darwin
            build: pnpm build --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: pnpm build --target aarch64-unknown-linux-gnu -x
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: pnpm build --target aarch64-unknown-linux-musl -x

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: pubmed-client-napi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: false

      - name: Setup repository environment
        uses: ./.github/actions/setup-repo
        with:
          rust-target: ${{ matrix.settings.target }}

      - name: Install pnpm dependencies
        run: pnpm install

      # Setup zig for cross-compilation (musl and aarch64-linux-gnu)
      - name: Setup zig
        if: contains(matrix.settings.target, 'musl') || matrix.settings.target == 'aarch64-unknown-linux-gnu'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.1.0 # zizmor: ignore[cache-poisoning]
        with:
          version: 0.14.1
          cache-key: ${{ runner.os }}-${{ matrix.settings.target }}

      - name: Install cargo-zigbuild
        if: contains(matrix.settings.target, 'musl') || matrix.settings.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-zigbuild

      - name: Build
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            pubmed-client-napi/*.node
            pubmed-client-napi/index.js
            pubmed-client-napi/index.d.ts
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    # Empty string disables the gate (dry-run); real publishes run in `release`
    # so the OIDC token carries the `environment` claim npm's Trusted Publisher
    # requires.
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write # npm provenance (trusted publishing)
    timeout-minutes: 15
    defaults:
      run:
        working-directory: pubmed-client-napi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: false

      - name: Setup repository environment
        uses: ./.github/actions/setup-repo

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm dependencies
        run: pnpm install

      # Note: download-artifact's path is relative to repo root, not working-directory
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bindings-*
          path: pubmed-client-napi/artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/*.node || echo "No .node files found"

      - name: Create npm directories
        run: pnpm run create-npm-dirs

      - name: Move artifacts to platform directories
        run: pnpm run artifacts

      - name: Copy JS/TS binding files to package root
        run: |
          cp artifacts/index.js .
          cp artifacts/index.d.ts .

      - name: Prepare npm packages (dry-run)
        if: ${{ inputs.dry-run }}
        run: pnpm run prepublishOnly --dry-run --no-gh-release

      - name: Publish dry-run main package
        if: ${{ inputs.dry-run }}
        run: npm publish --dry-run --access public

      # Idempotency: if the main package@version is already on npm, the platform
      # packages from that run exist too — skip so a re-run with the same tag is safe.
      - name: Check if already on npm
        id: npm-published
        if: ${{ !inputs.dry-run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "pubmed-client@${VERSION}" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::pubmed-client@${VERSION} already on npm — skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare npm packages
        if: ${{ !inputs.dry-run && steps.npm-published.outputs.exists != 'true' }}
        run: pnpm run prepublishOnly --no-gh-release

      - name: Publish main package
        if: ${{ !inputs.dry-run && steps.npm-published.outputs.exists != 'true' }}
        run: npm publish --provenance --access public

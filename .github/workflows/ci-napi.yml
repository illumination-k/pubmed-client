name: "CI / Node.js (NAPI)"

on:
  push:
    branches: [main]
    paths:
      - "pubmed-client-napi/**"
      - "pubmed-client/src/**"
      - "pubmed-client/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-napi.yml"
      - ".github/actions/setup-repo/**"
  pull_request:
    branches: [main]
    paths:
      - "pubmed-client-napi/**"
      - "pubmed-client/src/**"
      - "pubmed-client/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-napi.yml"
      - ".github/actions/setup-repo/**"
  workflow_dispatch: # Allow manual trigger for testing

# Publishing lives in release.yml (reusable _publish-napi.yml). This workflow is
# CI-only: lint, cross-compile every target, and test.

env:
  CARGO_TERM_COLOR: always
  DEBUG: napi:*
  APP_NAME: pubmed-client
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  SKIP_POSTINSTALL: "1"
  MISE_ENV: node

permissions:
  contents: read

jobs:
  lint:
    permissions:
      contents: read
    timeout-minutes: 10
    name: Lint
    # Local: MISE_ENV=node mise run lint:napi
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pubmed-client-napi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: false

      - name: Setup repository environment
        uses: ./.github/actions/setup-repo

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Biome lint and typecheck
        run: pnpm run ci
  build:
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: pnpm build --target x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm build --target x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm build --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: pnpm build --target x86_64-unknown-linux-musl -x
          - host: macos-latest
            target: aarch64-apple-darwin
            build: pnpm build --target aarch64-apple-darwin
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: pnpm build --target aarch64-unknown-linux-gnu -x
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: pnpm build --target aarch64-unknown-linux-musl -x

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: pubmed-client-napi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: false

      - name: Setup repository environment
        uses: ./.github/actions/setup-repo
        with:
          rust-target: ${{ matrix.settings.target }}

      - name: Install pnpm dependencies
        run: pnpm install

      # Setup zig for cross-compilation (musl and aarch64-linux-gnu)
      - name: Setup zig
        if: contains(matrix.settings.target, 'musl') || matrix.settings.target == 'aarch64-unknown-linux-gnu'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.1.0 # zizmor: ignore[cache-poisoning]
        with:
          version: 0.14.1
          cache-key: ${{ runner.os }}-${{ matrix.settings.target }}

      - name: Install cargo-zigbuild
        if: contains(matrix.settings.target, 'musl') || matrix.settings.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-zigbuild

      - name: Build
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            pubmed-client-napi/*.node
            pubmed-client-napi/index.js
            pubmed-client-napi/index.d.ts
          if-no-files-found: error

  test:
    permissions:
      contents: read
    timeout-minutes: 10
    name: Test
    runs-on: ubuntu-latest
    needs: [build, lint]
    defaults:
      run:
        working-directory: pubmed-client-napi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: false

      - name: Setup repository environment
        uses: ./.github/actions/setup-repo

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: .

      - name: Run tests
        run: pnpm test

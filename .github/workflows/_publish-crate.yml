name: "Publish Crate"

on:
  workflow_call:
    inputs:
      package:
        description: "Package name to publish (e.g., pubmed-client, pubmed-cli)"
        required: true
        type: string
      package-path:
        description: "Path to the package directory (e.g., pubmed-client, pubmed-cli)"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Perform a dry run without actually publishing"
        required: false
        type: boolean
        default: false
      check-version:
        description: "Check if version matches tag before publishing"
        required: false
        type: boolean
        default: true
      environment:
        description: >-
          GitHub Environment to run the publish in. Its OIDC `environment` claim
          must match the crates.io Trusted Publisher config. Empty string = no
          environment gate (used for dry-runs).
        required: false
        type: string
        default: ""

jobs:
  publish:
    name: Publish ${{ inputs.package }} to crates.io
    runs-on: ubuntu-latest
    # An empty string disables the environment gate (dry-run path). Real
    # publishes run in the `release` environment so the OIDC token carries the
    # `environment` claim crates.io's Trusted Publisher requires.
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      # Trusted Publishing: mint a short-lived crates.io token via OIDC.
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          lfs: true
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ inputs.package }}

      - name: Get package path
        id: pkg-path
        env:
          PKG_PATH: ${{ inputs.package-path }}
          PKG_NAME: ${{ inputs.package }}
        run: |
          if [ -z "$PKG_PATH" ]; then
            echo "path=$PKG_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "path=$PKG_PATH" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from tag
        id: tag-version
        if: inputs.check-version
        env:
          PKG_NAME: ${{ inputs.package }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          VERSION=${TAG#v}
          # Extract version if tag follows pattern like 'package-name-v1.0.0'
          if [[ $TAG == *"$PKG_NAME"* ]]; then
            VERSION=${TAG##*-v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Check Cargo.toml version
        id: cargo-version
        working-directory: ${{ steps.pkg-path.outputs.path }}
        run: |
          # Match only 'version = "..."', not 'version.workspace = true'
          VERSION=$(grep -m1 '^version\s*=' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          # If empty, package uses workspace inheritance - read from workspace root
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -m1 '^version\s*=' "$GITHUB_WORKSPACE/Cargo.toml" | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml version: $VERSION"

      - name: Verify version match
        if: inputs.check-version
        env:
          TAG_VERSION: ${{ steps.tag-version.outputs.version }}
          CARGO_VERSION: ${{ steps.cargo-version.outputs.version }}
        run: |
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Tag: $TAG_VERSION, Cargo.toml: $CARGO_VERSION"
            exit 1
          fi
          echo "✓ Version match confirmed: $CARGO_VERSION"

      # Idempotency: skip if this version is already on crates.io, so a partially
      # failed release can be safely re-run with the same tag.
      - name: Check if already published
        id: published
        if: ${{ !inputs.dry-run }}
        env:
          PKG_NAME: ${{ inputs.package }}
          PKG_VERSION: ${{ steps.cargo-version.outputs.version }}
        run: |
          STATUS=$(curl -so /dev/null -w '%{http_code}' \
            -H "User-Agent: pubmed-client-release (github actions)" \
            "https://crates.io/api/v1/crates/${PKG_NAME}/${PKG_VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PKG_NAME}@${PKG_VERSION} already on crates.io — skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate package
        if: ${{ inputs.dry-run || steps.published.outputs.exists != 'true' }}
        working-directory: ${{ steps.pkg-path.outputs.path }}
        env:
          PKG_NAME: ${{ inputs.package }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          echo "Validating package: $PKG_NAME"
          cargo package --list
          # The verification build resolves internal workspace deps (e.g.
          # pubmed-parser) from crates.io, not from their local path. In a dry-run
          # nothing is actually published, so those versions don't exist on
          # crates.io yet and the verify build can't resolve them. Skip verify in
          # dry-run; real releases publish in dependency order (and wait for the
          # registry index below), so the verify build resolves fine.
          if [ "$DRY_RUN" = "true" ]; then
            cargo package --allow-dirty --no-verify
          else
            cargo package --allow-dirty
          fi

      - name: Publish to crates.io (dry-run)
        if: ${{ inputs.dry-run }}
        working-directory: ${{ steps.pkg-path.outputs.path }}
        env:
          PKG_NAME: ${{ inputs.package }}
        run: |
          echo "Dry run - would publish: $PKG_NAME"
          # --no-verify: the verify build would resolve internal deps from
          # crates.io, which aren't published in a dry-run. See the Validate step.
          # No auth needed: --dry-run never contacts the registry for upload.
          cargo publish --dry-run --no-verify

      # Trusted Publishing: exchange the job's OIDC token for a short-lived
      # crates.io token. Requires a Trusted Publisher configured for this crate
      # on crates.io (repo + workflow). No long-lived CRATES_IO_TOKEN secret.
      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        if: ${{ !inputs.dry-run && steps.published.outputs.exists != 'true' }}
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish to crates.io
        if: ${{ !inputs.dry-run && steps.published.outputs.exists != 'true' }}
        working-directory: ${{ steps.pkg-path.outputs.path }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          PKG_NAME: ${{ inputs.package }}
        run: |
          echo "Publishing package: $PKG_NAME"
          cargo publish

      - name: Wait for crate to appear in the registry index
        if: ${{ !inputs.dry-run && steps.published.outputs.exists != 'true' }}
        env:
          PKG_NAME: ${{ inputs.package }}
          PKG_VERSION: ${{ steps.cargo-version.outputs.version }}
        run: |
          # The next crate in the dependency chain (pubmed-parser → pubmed-formatter
          # → pubmed-client → ...) runs in a separate job with a fresh checkout and
          # resolves this crate from the sparse index. `cargo publish` only waits
          # for the index within its own invocation, not across jobs, so poll the
          # sparse index here until this version is visible before the job finishes.
          # Sparse index path layout: lowercase name, sharded by length.
          name=$(echo "$PKG_NAME" | tr '[:upper:]' '[:lower:]')
          case "${#name}" in
            1) path="1/$name" ;;
            2) path="2/$name" ;;
            3) path="3/${name:0:1}/$name" ;;
            *) path="${name:0:2}/${name:2:2}/$name" ;;
          esac
          url="https://index.crates.io/$path"
          echo "Polling $url for version $PKG_VERSION"
          for i in $(seq 1 30); do
            if curl -s -H "User-Agent: pubmed-client-release (github actions)" "$url" \
                | grep -q "\"vers\":\"$PKG_VERSION\""; then
              echo "::notice::$PKG_NAME@$PKG_VERSION is visible in the registry index"
              exit 0
            fi
            echo "  not yet indexed (attempt $i/30) — sleeping 10s"
            sleep 10
          done
          echo "::error::$PKG_NAME@$PKG_VERSION did not appear in the registry index within timeout"
          exit 1

      - name: Publish summary
        if: ${{ !inputs.dry-run }}
        env:
          PKG_NAME: ${{ inputs.package }}
          PKG_VERSION: ${{ steps.cargo-version.outputs.version }}
        run: |
          {
            echo "### ✅ Published to crates.io"
            echo ""
            echo "- **Package**: $PKG_NAME"
            echo "- **Version**: $PKG_VERSION"
            echo "- **crates.io**: https://crates.io/crates/$PKG_NAME"
          } >> "$GITHUB_STEP_SUMMARY"

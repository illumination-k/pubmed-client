name: "Publish WASM (npm)"

# Reusable workflow: build the wasm-pack package and publish `pubmed-client-wasm`
# to npm. The published package (pkg/) is generated by wasm-pack from the crate
# Cargo.toml, whose version is kept in sync by scripts/sync-versions.sh.
# Invoked by release.yml. Set dry-run to validate packaging without publishing.

on:
  workflow_call:
    inputs:
      dry-run:
        description: "Build and pack without publishing to npm"
        required: false
        type: boolean
        default: false
      environment:
        description: >-
          GitHub Environment for the publish job. Its OIDC `environment` claim
          must match the npm Trusted Publisher config. Empty string = no
          environment gate (used for dry-runs).
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always
  MISE_ENV: node

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Empty string disables the gate (dry-run); real publishes run in `release`
    # so the OIDC token carries the `environment` claim npm's Trusted Publisher
    # requires.
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write # npm provenance (trusted publishing)
    timeout-minutes: 20
    defaults:
      run:
        working-directory: pubmed-client-wasm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          persist-credentials: false

      - uses: ./.github/actions/setup-repo
        with:
          rust-target: wasm32-unknown-unknown
          skip-postinstall: "true"

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: latest

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Build WASM package
        run: pnpm run build

      - name: Publish (dry-run)
        if: ${{ inputs.dry-run }}
        working-directory: pubmed-client-wasm/pkg
        run: npm publish --dry-run --access public

      # Idempotency: skip if this version is already on npm (safe re-run with same tag).
      - name: Check if already on npm
        id: npm-published
        if: ${{ !inputs.dry-run }}
        working-directory: pubmed-client-wasm/pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "pubmed-client-wasm@${VERSION}" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::pubmed-client-wasm@${VERSION} already on npm — skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ !inputs.dry-run && steps.npm-published.outputs.exists != 'true' }}
        working-directory: pubmed-client-wasm/pkg
        run: npm publish --provenance --access public

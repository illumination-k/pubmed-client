name: "CI / R"

on:
  push:
    branches: [main]
    paths:
      - "pubmed-client-r/**"
      - "pubmed-client/src/**"
      - "pubmed-client/Cargo.toml"
      - "pubmed-parser/**"
      - "pubmed-formatter/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-r.yml"
  pull_request:
    branches: [main]
    paths:
      - "pubmed-client-r/**"
      - "pubmed-client/src/**"
      - "pubmed-client/Cargo.toml"
      - "pubmed-parser/**"
      - "pubmed-formatter/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-r.yml"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # Format check for the inner extendr crate. It is NOT a workspace member, so
  # `mise run lint:rs` (which runs over the workspace) never sees it — this step
  # keeps it formatted. rustfmt does not compile the crate, so no R/libR needed.
  rust-fmt:
    name: R crate rustfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check --manifest-path pubmed-client-r/src/rust/Cargo.toml

  # R CMD check installs the package, which compiles the extendr static library
  # (hence the Rust toolchain) and then runs the testthat suite. R and the R
  # package dependencies are installed with apt + a binary CRAN mirror rather
  # than r-lib/actions, so every action stays pinned to a full commit SHA.
  R-CMD-check:
    name: R CMD check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 45
    env:
      R_KEEP_PKG_SOURCE: yes
      # Do not error the check when an optional Suggests package is unavailable.
      _R_CHECK_FORCE_SUGGESTS_: false
      # Posit Public Package Manager serves precompiled binaries for ubuntu,
      # avoiding slow source installs of testthat/rcmdcheck and their deps.
      RSPM: https://packagemanager.posit.co/cran/__linux__/noble/latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: "pubmed-client-r/src/rust -> target"

      - name: Install R
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-dev

      - name: Install R package dependencies
        run: |
          Rscript -e 'install.packages(c("testthat", "rcmdcheck"), repos = Sys.getenv("RSPM"))'

      - name: R CMD check
        run: |
          Rscript -e 'rcmdcheck::rcmdcheck("pubmed-client-r", args = c("--no-manual", "--no-build-vignettes"), error_on = "warning")'

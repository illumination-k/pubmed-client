# Minimal base: hooks + developer onboarding entry points.
# Use MISE_ENV to load area-specific tools and tasks:
#   MISE_ENV=root        → mise.root.toml  (dprint, actionlint, fmt/lint tasks)
#   MISE_ENV=rust        → mise.rust.toml  (cargo-nextest, cargo-llvm-cov + Rust tasks)
#   MISE_ENV=node        → mise.node.toml  (node, pnpm + NAPI/WASM/website tasks)
#   MISE_ENV=python      → mise.python.toml (uv + PYO3 env + Python tasks)
#
# For full local setup: mise run setup:all

[hooks]
postinstall = ["bash ./etc/postinstall.sh"]

[tools]
"github:illumination-k/agent-lens" = { version = "rolling", prerelease = true }

[env]
# Suppress verbose Rust tool output (affects all Rust-based CLIs like cargo, dprint, etc.)
RUST_LOG = "warn"

[tasks.fmt]
description = "Format all code (runs fmt:* tasks from active environments)"
depends = ["fmt:*"]

[tasks.lint]
description = "Lint all code (runs lint:* tasks from active environments)"
depends = ["lint:*"]

[tasks.sync-versions]
description = "Propagate the workspace version to napi/wasm/py packages"
run = "scripts/sync-versions.sh"

[tasks.release]
description = "Bump every package to one unified version. Usage: mise run release 0.3.0"
run = [
  "scripts/sync-versions.sh {{arg(name='version')}}",
  # Refresh only the workspace members in Cargo.lock (leaves registry deps alone)
  "cargo update --workspace",
  "scripts/sync-versions.sh --check",
  "echo ''",
  "echo 'Versions bumped to {{arg(name=\"version\")}}. Next:'",
  "echo '  git commit -am \"release: v{{arg(name=\"version\")}}\"'",
  "echo '  git tag v{{arg(name=\"version\")}} && git push origin main --tags'",
  "echo 'The v* tag triggers release.yml → crates.io + npm (napi/wasm) + PyPI.'",
]
